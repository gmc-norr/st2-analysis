---
name: second_plumber_analysis
pack: gmc_norr_analysis
description: >
  Move a plumber analysis and update it in Cleve to state ready
  and add output files
enabled: true

trigger:
  type: "core.st2.webhook"
  parameters:
    url: "plumber"

criteria:
  trigger.body.message_type:
    type: equals
    pattern: end
  trigger.body.success:
    type: equals
    pattern: true
  trigger.body.pipeline:
    type: equals
    pattern: genomic-medicine-sweden/Twist_Solid

action:
  ref: gmc_norr_analysis.second_plumber_analysis
  parameters:
    first_analysis_id: "{{ trigger.body.analysis_id }}"
    first_pipeline: "{{ trigger.body.pipeline }}"
    first_workdir: "{{ trigger.body.workdir }}"
