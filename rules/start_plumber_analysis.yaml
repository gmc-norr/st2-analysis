name: start_plumber_analysis
description: >
  Rule for starting downstream analysis with plumber
  when BCLConvert has readied the fastq files
pack: gmc_norr_analysis
enabled: true

trigger:
  type: cleve.analysis_state_update

criteria:
  trigger.state:
    type: equals
    pattern: ready
  trigger.software:
    type: contains
    pattern: BCLConvert

action:
  ref: gmc_norr_analysis.start_plumber_workflows
  parameters:
    path: "{{ trigger.path }}"
    analysis_id: "{{ trigger.analysis_id }}"
