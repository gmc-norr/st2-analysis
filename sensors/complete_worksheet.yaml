---
class_name: CompleteWorksheetSensor
entry_point: complete_worksheet.py
description: >
  Sensor that emits triggers for when all samples in an
  automation log file is marked either as completed or failed.
poll_interval: 60
enabled: true
trigger_types:
  - name: complete_worksheet
    pack: cleve
    description: >
      Triggers when a new run directory is found
    payload_schema:
      type: object
      properties:
        pipeline:
          type: string
          description: The path to the new directory
          required: true
        completed_samples:
          type: array
          description: Samples that completed the analysis successfully
          required: false
        failed_samples:
          type: array
          description: Samples that failed the analysis
          required: false
