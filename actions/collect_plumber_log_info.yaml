    type: string
    required: true
  pipeline:
    description: ID of the ready analysis
    type: string
    required: true
  type:
    description: ID of the ready analysis
    type: string
    required: true
  success:
    description: ID of the ready analysis
    type: string
    required: true
  base_log_dir:
    description: ID of the ready analysis
    type: string
    required: true
    default: "{{ config_context.plumber.log_dir }}"
