---
name: add_plumber_analysis
pack: gmc_norr_analysis
description: Workflow to add a new plumber analysis to Cleve
runner_type: orquesta
entry_point: workflows/add_plumber_analysis.yaml
enabled: true

parameters:
  analysis_id:
    description: The ID of the plumber analysis to be added to Cleve
    type: string
    required: true
  prev_analysis_id:
    description: The ID of the analysis that generated the fastq_files
    type: string
    required: true
  run_id:
    description: The ID of the run the sample was sequenced in
    type: string
    required: true
  sample_id:
    description: The ID of the sample that is being analysed
    type: string
    required: true
  pipeline:
    description: The pipeline that plumber is running
    type: string
    required: true
  pipeline_version:
    description: The version of the pipeline
    type: string
    required: true
  workdir:
    description: The path to the directory where the analysis is run py plumber
    type: string
    required: true
  fastq_files:
    description: An array with the fastq files used in the analysis
    type: array
    items:
      type: string
      description: A fastq file
      required: true
