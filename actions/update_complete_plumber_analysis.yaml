---
name: update_complete_plumber_analysis
pack: gmc_norr_analysis
description: Workflow to move a complete plumber analysis, update it in Cleve,
  and start scout generate and load case workflow
runner_type: orquesta
entry_point: workflows/update_complete_plumber_analysis.yaml
enabled: true

parameters:
  analysis_id:
    description: The ID of the plumber analysis
    type: string
    required: true
  pipeline:
    description: The pipeline the analysis was performed with
    type: string
    required: true
  workdir:
    description: The path to the work directory where the analysis was run by plumber
    type: string
    required: true
  sample_id:
    description: The ID of the sample that was analysed
    type: string
    required: false
  run_id:
    description: The ID of the run
    type: string
    required: false
  case_id:
    description: The ID of the case. Required for Twist Solid analyses.
    type: string
    required: false
  secondary_analysis_id:
    description: The id of the secondary analysis (e.g. scout-annotation). Required for Twist Solid analyses.
    type: string
    required: false
  secondary_pipeline:
    description: The pipeline the secondary analysis was performed with. Required for Twist Solid analyses.
    type: string
    required: false
  log_suffix:
    description: Workdir of failed analysis
    type: string
    required: true
    default: "{{ config_context.plumber.log_suffix }}"
