---
name: plumber_sample_analysis
pack: gmc_norr_analysis
description: Workflow to run analysis of a sample with plumber
runner_type: orquesta
entry_point: workflows/plumber_sample_analysis.yaml
enabled: true

parameters:
  sample:
    description: run id of the ready sequencing run
    type: string
    required: true
  path:
    description: path ot sequencing run
    type: string
    required: true
  notification_email:
    type: array
    items:
      type: string
      description: "Email address to send notification to"  
    default: "{{ config_context.notification_email | to_json_string }}"
  plumber_host:
    description: Host to run plumber on
    type: string
    default: "{{ config_context.plumber.host}} "
    required: true
