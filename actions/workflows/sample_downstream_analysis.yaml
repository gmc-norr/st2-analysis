version: "1.0"

description: Run downstream analysis of a sample with plumber.
input:
  - sample_id
  - run_path
  - analysis_path

tasks:
  get_sample_data:
    action: igene.get_sample
    input:
      sample: <% ctx().sample_id %>
    retry:
      when: "{{ failed() }}"
      delay: 1
      count: 2
    next:
      - when: "{{ succeeded() }}"
        publish:
          test_profile={{ result().get("body", {}).get("TestProfile")}}
          referral_type={{ result().get("body", {}).get("ReferralType")}}
          sex={{ result().get("body", {}).get("Sex")}}
          output_dir="{{ ctx().run_path }}/{{ctx().test_profile }}/{{ ctx().sample_id }}"
        do:
          get_plumber_arguments
      - when: "{{ failed() }}"
        publish:
          msg="Failed to get sample data from the iGene API.
          {{ result() | to_json_string }}"
        do:
          report_failure

  get_plumber_arguments:
    action: gmc_norr_analysis.get_plumber_arguments
    input:
       test_profile: "<% ctx().test_profile %>"
    next:
      - when: "{{ succeeded() }}"
        publish:
          pipeline_system={{result().get("result").get("PipelineSystem", None)}}
          pipeline={{ result().get("result").get("Pipeline", None)}}
          pipeline_profile={{ result().get("result").get("Profile", None)}}
          pipeline_version={{ result().get("result").get("Version", None)}}
          plumber_config_version={{ result().get("result").get("ConfigVersion", None)}}
        do:
          prepare_output_folder
      - when: "{{ failed() }}"
        publish:
          msg="Failed to get TestProfile configuration.
          {{ result() | to_json_string }}"
        do:
          report_failure

  prepare_output_folder:
    action: core.local
    input:
      cmd:  "mkdir -p <% ctx().output_dir %>"
    next:
      - when: "{{ succeeded() }}"
        do:
          get_case_id

  get_case_id:
    action: gmc_norr_analysis.make_case_id
    next:
      - when: "{{ succeeded() }}"
        publish:
          case_id={{result().result}}
        do:
          make_plumber_cmd
      - when: "{{ failed() }}"
        publish:
          msg="Failed to generate case id.
          {{ result() | to_json_string }}"
        do:
          report_failure

  make_plumber_cmd:
    action: core.echo message="nohup plumber <% ctx().pipeline_system %> run <% ctx().pipeline %>
      --version <% ctx().pipeline_version %> --config-version <% ctx().plumber_config_version %>
      -p <% ctx().pipeline_profile %> > plumber.log & echo \$!"
    next:
      - when: "{{ ctx().test_profile == 'WGSRareDisease_1' }}"
        publish:
          plumber_cmd="{{ result().stdout}}"
        do:
          make_rare_disease_input_files
      - when: "{{ ctx().test_profile != 'WGSRareDisease_1'}}"
        publish:
          msg="Unsupported pipeline {{ ctx().test_profile }}"
        do:
          report_failure

  make_rare_disease_input_files:
    action: gmc_norr_analysis.make_rare_disease_samplesheet
    input:
      analysis_dir: <% ctx().analysis_path %>
      sample_id: <% ctx().sample_id %>
      case_id: <% ctx().case_id %>
      referral_type: <% ctx().referral_type %>
      sex: <% ctx().sex %>
      out_dir: <% ctx().output_dir %>
    next:
      - when: "{{ succeeded() }}"
        do: start_plumber
      - when: "{{ failed() }}"
        publish:
          msg="Failed to make rare-disease samplesheet.
          {{ result() | to_json_string }}"
        do: report_failure

  start_plumber:
    action: gmc_norr_analysis.start_plumber_remote
    input:
      cmd: <% ctx().plumber_cmd %>
      cwd: <% ctx().output_dir %>
    next:
      - when: "{{ result().get((result().keys() | list | first)).get('stderr') == '' }}"
        publish:
          pid="{{ result().get((result().keys() | list | first)).get('stdout') }}""
        do:
          pause
      - when: "{{ result().get((result().keys() | list | first)).get('stderr') != '' }}"
        publish:
          msg="Failed to start plumber.
          {{result() | to_json_string }}"
        do:
          report_failure

  pause:
    action: core.pause max_pause=30
    next:
      - when: "{{ succeeded() }}"
        do:
          check_progress

  check_progress:
    action: gmc_norr_analysis.check_plumber_progress
    input:
      cmd: "ps --no-headers --pid {{ctx().pid}}"
      cwd: <% ctx().output_dir %>
    next:
      - when: "{{ failed() }}"
        publish:
          msg="Plumber crashed running {{ ctx().pipeline }}
          in {{ctx().output_dir}}."
        do:
          report_failure

  report_failure:
    action: core.inject_trigger
    input:
      trigger_name: gmc_norr_analysis.email_notification
      payload:
        subject: "Failed to analyse sample {{ctx().sample_id}}"
        message: "{{ctx().msg}}"
