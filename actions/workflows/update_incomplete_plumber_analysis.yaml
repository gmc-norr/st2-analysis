version: 1.0
name: update_incomplete_plumber_analysis
description: >
  Workflow updating a successful plumber analysis in Cleve

input:
  - pipeline
  - pipeline_version
  - workdir

vars:
  - msg:
  - analysis_id:

tasks:
  make_analyis_id:
    action: gmc_norr_analysis.make_plumber_analysis_id
    input:
      workdir: "{{ ctx().workdir }}"
      pipeline: "{{ ctx().pipeline }}"
      pipeline_version: "{{ ctx().pipeline_version }}"
    next:
      - when: "{{ succeeded() }}"
        publish:
          analysis_id="{{ result().result }}"
        do:
          update_in_cleve
      - when: "{{ failed() }}"
        publish:
          - msg: "{{ result() }}"
        do:
          - report_failure

  update_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: "{{ ctx().analysis_id }}"
      state: incomplete
    next:
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  report_failure:
    action: core.inject_trigger
    input:
      trigger_name: gmc_norr_analysis.email_notification
      payload:
        subject: >
          Failed to update incomplete plumber analysis in {{ ctx().workdir }}
          with {{ ctx().pipeline }} in Cleve
        message: "{{ ctx().msg }}"
