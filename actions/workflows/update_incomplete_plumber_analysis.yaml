version: 1.0
name: update_incomplete_plumber_analysis
description: >
  Workflow to update an incomplete plumber analysis in Cleve

input:
  - analysis_id
  - pipeline
  - pipeline_version
  - workdir

vars:
  - msg:

tasks:
  update_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: "{{ ctx().analysis_id }}"
      state: incomplete
    next:
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  report_failure:
    action: core.inject_trigger
    input:
      trigger_name: gmc_norr_analysis.email_notification
      payload:
        subject: >
          Failed to update incomplete plumber analysis in {{ ctx().workdir }}
          with {{ ctx().pipeline }} in Cleve
        message: "{{ ctx().msg }}"
