version: 1.0
name: update_complete_plumber_analysis
description: >
  Workflow handling a finished plumber analysis: First moving the output,
  then updating the analysis in Cleve (state, path, and output files)

input:
  - analysis_id
  - pipeline
  - workdir
  - sample_id
  - run_id
  - case_id
  - secondary_analysis_id
  - secondary_pipeline
  - log_suffix

vars:
  - msg:
  - platform:
  - run_path:
  - output_files:
  - secondary_output_files:
  - destination:
  - new_workdir:
  - test_profile:

output:
  - msg: <% ctx().msg %>

tasks:
  check_start:
    action: core.noop
    next:
      - when: <% ctx(sample_id) != null and ctx(run_id) != null %>
        do: get_run_platform
      - when: <% ctx(sample_id) = null or ctx(run_id) = null %>
        do: get_sample_id

  get_sample_id:
    action: core.local
    input:
      cmd: basename <% ctx().workdir %>
    next:
      - when: "{{ succeeded() }}"
        publish:
          - sample_id: <% result().stdout %>
        do:
          get_run_id
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  get_run_id:
    action: cleve.get_analyses
    input:
      analysis_id: <% ctx().analysis_id %>
    retry:
      when: "{{ failed() }}"
      delay: 1
      count: 2
    next:
      - when: <% failed() %>
        publish:
          - msg: Cleve not reachable
        do: report_failure
      - when: <% succeeded() and result().result.body.metadata.count = 0 %>
        publish:
          - msg: analysis <% ctx().analysis_id %> not found in Cleve
        do: report_failure
      - when: <% succeeded() and result().result.body.metadata.count > 1 %>
        publish:
          - msg: more than one analysis with ID <% ctx().analysis_id %> found in Cleve
        do: report_failure
      - when: <% succeeded() and result().result.body.metadata.count = 1 %>
        publish:
          - run_id: <% result().result.body.analyses.first().runs.first() %>
        do:
          get_run_platform

  get_run_platform:
    action: cleve.get_runs
    input:
      run_id: <% ctx(run_id) %>
    retry:
      when: "{{ failed() }}"
      delay: 1
      count: 2
    next:
      - when: <% failed() %>
        publish:
          - msg: Cleve not reachable
        do: report_failure
      - when: <% succeeded() and result().result.body.metadata.count = 0 %>
        publish:
          - msg: "run <% ctx(run_id) %> not found in Cleve"
        do: report_failure
      - when: <% succeeded() and result().result.body.metadata.count > 1 %>
        publish:
          - msg: "more than one run with ID <% ctx(run_id) %> found in Cleve"
        do: report_failure
      - when: <% succeeded() and result().result.body.metadata.count = 1 %>
        publish:
          - platform: <% result().result.body.runs.first().platform %>
          - run_path: <% result().result.body.runs.first().path %>
        do: get_destination

  get_destination:
    action: gmc_norr_seqdata.get_file_destination
    input:
      platform: <% ctx(platform) %>
      type: run
    next:
      - when: <% failed() %>
        publish:
          - msg: "failed to get destination from gmc_norr_seqdata's pack config"
        do: report_failure
      - when: <% succeeded() and result().result = null %>
        publish:
          - msg: "destination not defined for platform: <% ctx(platform) %>"
        do: report_failure
      - when: <% succeeded() and result().result != null %>
        publish:
          - destination: "{{ result().result }}/{{ ctx().run_id }}/{{ ctx().pipeline.split('/')[-1] }}"
          - new_workdir: "{{ ctx().destination }}/{{ ctx().sample_id }}"
        do: make_destination

  make_destination:
    action: core.local
    input:
      cmd: mkdir -p "{{ ctx().destination }}"
    next:
      - when: "{{ succeeded() }}"
        do: rsync_output
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  rsync_output:
    action: core.local
    input:
      cmd: "rsync -a --remove-source-files <% ctx().workdir %> <% ctx().destination %>"
      timeout: 10000
    next:
      - when: "{{ succeeded() }}"
        do: divide_pipeline_tasks
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  divide_pipeline_tasks:
    action: core.noop
    next:
      - when: "{{ ctx().pipeline == 'nf-core/raredisease'}}"
        do:
          get_case_id
      - when: <% ctx().pipeline = 'genomic-medicine-sweden/Twist_Solid' %>
        do:
          check_twist_solid_needed_variables
      - when: <% ctx().pipeline != 'nf-core/raredisease' and ctx().pipeline != 'genomic-medicine-sweden/Twist_Solid' %>
        publish:
          - msg: "Unsupported pipeline {{ ctx().pipeline }}"
        do:
          report_failure

  get_case_id:
    action: core.local
    input:
      cmd: 'cut -d "," -f 9 "{{ ctx().new_workdir }}/samplesheet.csv" | tail -n 1'
    next:
      - when: "{{ succeeded() }}"
        publish:
          - case_id: <% result().stdout %>
        do: check_case_id
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  check_case_id:
    action: core.noop
    next:
      - when: "{{ ctx().case_id != '' }}"
        do: format_output_files
      - when: "{{ ctx().case_id == '' }}"
        publish:
          - msg: "Failed to parse the case ID from the samplesheet."
        do:
          - report_failure

  check_twist_solid_needed_variables:
    action: core.noop
    next:
      - when: <% ctx().case_id != null and ctx().secondary_pipeline != null
         and ctx().secondary_analysis_id != null %>
        do: format_secondary_output_files
      - when: <% ctx().case_id = null or ctx().secondary_pipeline = null
         or ctx().secondary_analysis_id = null %>
        publish:
          msg="Missing necessary variables to be able to
          continue for genomic-medicine-sweden/Twist_Solid.
          Secondary analysis id {{ ctx().secondary_analysis_id }}
          Secondary pipeline {{ ctx().secondary_pipeline }}
          case id {{ ctx().case_id }}"
        do:
          - report_failure

  format_secondary_output_files:
    action: gmc_norr_analysis.get_pipeline_output_files
    input:
      pipeline: "{{ ctx().secondary_pipeline }}"
      case_id: "{{ ctx().case_id }}"
      sample_id: "{{ ctx().sample_id }}"
    next:
      - when: "{{ succeeded() }}"
        publish:
          - secondary_output_files: <% result().result %>
        do: update_secondary_path_in_cleve
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  update_secondary_path_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: <% ctx().secondary_analysis_id %>
      path: "{{ ctx().new_workdir }}/{{ ctx().secondary_pipeline.split('/')[1] }}"
      state: ready
    next:
      - when: "{{ succeeded() }}"
        do: update_secondary_files_in_cleve
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  update_secondary_files_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: <% ctx().secondary_analysis_id %>
      files: <% ctx().secondary_output_files %>
    next:
      - when: "{{ succeeded() }}"
        do: format_output_files
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  format_output_files:
    action: gmc_norr_analysis.get_pipeline_output_files
    input:
      pipeline: "{{ ctx().pipeline }}"
      case_id: "{{ ctx().case_id }}"
      sample_id: "{{ ctx().sample_id }}"
    next:
      - when: "{{ succeeded() }}"
        publish:
          - output_files: <% result().result %>
        do: update_path_in_cleve
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  update_path_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: <% ctx().analysis_id %>
      path: <% ctx().new_workdir %>
      state: ready
    next:
      - when: "{{ succeeded() }}"
        do: update_files_in_cleve
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  update_files_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: <% ctx().analysis_id %>
      files: <% ctx().output_files %>
    next:
      - when: "{{ succeeded() }}"
        do: start_scout_workflow
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  start_scout_workflow:
    action: scout.generate_and_load_case
    input:
      case_id: <% ctx().case_id %>
      sample_ids:
        - <% ctx().sample_id %>
      pipeline: <% ctx().pipeline %>
      analysis_id: <% ctx().analysis_id %>
      output_path: <% ctx().new_workdir %>
      secondary_analysis_id: <% ctx().secondary_analysis_id %>
    next:
      - when: "{{ succeeded() }}"
        publish:
          - test_profile: <% result().output.test_profile %>
        do: log_sample

  log_sample:
    action: core.local
    input:
      cmd:  sed -i 's/<% ctx().sample_id %> started/<% ctx().sample_id %> completed/' <% ctx().test_profile %>.<% ctx().log_suffix %>
      cwd: <% ctx().run_path %>
    next:
      - when: "{{ failed() }}"
        publish:
          msg="Failed to log success"
        do:
          - report_failure
      - when: "{{ succeeded() }} and ctx().pipeline == 'genomic-medicine-sweden/Twist_Solid' }}"
        do: copy_bam

  copy_bam:
    action: gmc_norr_seqdata.copy_bam
    input:
      run_id: <% ctx().run_id %>
      pipeline: <% ctx().pipeline %>
      bam_path: <% ctx().new_workdir %>/bam_dna
    next:
      - when: "{{ failed() }}"
        publish:
          - msg: "Failed to move bam files to K:
              {{ result() | to_json_string }}"
        do:
          - report_failure

  report_failure:
    action: core.inject_trigger
    input:
      trigger_name: gmc_norr_analysis.email_notification
      payload:
        subject: >
          Failed to move or update successful {{ ctx().pipeline }} analysis of sample {{ ctx().sample_id }}
          in {{ ctx().workdir }} in Cleve
        message: <% ctx().msg %>
    next:
      - when: "{{ succeeded() }}"
        do: fail
