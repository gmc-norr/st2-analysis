version: 1.0
name: update_complete_plumber_analysis
description: >
  Workflow updating a successful plumber analysis in Cleve

input:
  - analysis_id
  - pipeline
  - workdir

vars:
  - msg:
  - sample_id:
  - case_id:
  - output_files:

tasks:
  get_sample_id:
    action: core.local
    input:
      cmd: basename "{{ctx().workdir}}"
    next:
      - when: "{{ succeeded() }}"
        publish:
          sample_id="{{result().stdout}}"
        do:
          get_run_id
      - when: "{{ failed() }}"
        publish:
          - msg: "{{ result() }}"
        do:
          - report_failure

  get_run_id:
    action: cleve.get_analyses
    input:
      analysis_id: <% ctx().analysis_id %>
    retry:
      when: "{{ failed() }}"
      delay: 1
      count: 3
    next:
      - when: "{{ succeeded() }}"
        publish:
          run_id={{ result().get("result").get("body").get("analyses") | map(attribute='runs') | first }}
        do:
          get_destination
      - when: "{{ failed() }}"
        publish:
          msg="Failed to get run id from Cleve.
          {{ result() | to_json_string }}"
        do:
          report_failure

  get_destination:
    action: gmc_norr_seqdata.get_data_destination
    input:
      platform: <% ctx(platform) %>
    next:
      - when: <% failed() %>
        publish:
          - msg: "failed to get destination from gmc_norr_seqdata's pack config"
        do: fail
      - when: <% succeeded() and result().result = null %>
        publish:
          - msg: "destination not defined for platform: <% ctx(platform) %>"
        do: fail
      - when: <% succeeded() and result().result != null %>
        publish:
          - destination: "{{ result().result }}/{{ctx().run_id}}/{{ctx().pipeline}}"
        do: make_destination

  make_destination:
    action: core.local
    input:
      cmd: mkdir -p "{{ ctx().destination }}"
    next:
      - when: "{{ succeeded() }}"
        do: rsync_output
      - when: "{{ failed() }}"
        publish:
          - msg: <% result() %>
        do:
          - report_failure

  rsync_output:
    action: linux.rsync
    input:
      source: "{{ctx().workdir }}"
      destination: "{{ ctx().destination }}"
      args: "-avz"
    next:
      - when: "{{ succeeded() }}"
        do: divide_pipeline_tasks
      - when: "{{ failed() }}"
        publish:
          - msg: <% result() %>
        do:
          - report_failure

  divide_pipeline_tasks:
    action: core.noop
    next: # Should be the only possible one until we add more to sample_downstream_analysis
      - when: "{{ ctx().pipeline == 'nf-core-raredisease'}}"
        do:
          get_case_id
      - when: "{{ ctx().pipeline != 'nf-core-raredisease'}}"
        publish:
          msg="Unsupported pipeline {{ ctx().pipeline }}"
        do:
          report_failure

  get_case_id:
    action: core.local
    input:
      cmd: 'cut -d "," -f 9 "{{ ctx().workdir }}/samplesheet.csv" | tail -n 1'
    next:
      - when: "{{ succeeded() }}"
        publish:
          case_id="{{result().stdout}}"
        do: check_case_id
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  check_case_id:
    action: core.noop
    next:
      - when: "{{ ctx().case_id != '' }}"
        do: format_rd_output_files
      - when: "{{ ctx().case_id == '' }}"
        publish:
          - msg: "Failed to parse the case ID from the samplesheet."
        do:
          - report_failure

  format_rd_output_files:
    action: gmc_norr_analysis.get_rd_output_files
    input:
      case_id: "{{ ctx().case_id }}"
      sample_id: "{{ ctx().sample_id }}"
    next:
      - when: "{{ succeeded() }}"
        publish:
          output_files="{{ result().get('result') }}"
        do: update_in_cleve
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  update_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: "{{ ctx().analysis_id}}"
      state: ready
      files: "{{ ctx().output_files }}"
    next:
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  report_failure:
    action: core.inject_trigger
    input:
      trigger_name: gmc_norr_analysis.email_notification
      payload:
        subject: >
          Failed to update successful plumber analysis of sample {{ ctx().sample_id }}
          in {{ ctx().workdir }} with {{ ctx().pipeline }} in Cleve
        message: "{{ctx().msg}}"
