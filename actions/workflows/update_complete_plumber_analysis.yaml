version: 1.0
name: update_complete_plumber_analysis
description: >
  Workflow updating a successful plumber analysis in Cleve

input:
  - pipeline
  - pipeline_version
  - workdir

vars:
  - msg:
  - sample_id:
  - analysis_id:
  - result_path:
  - output_files:

tasks:
  make_analysis_id:
    action: gmc_norr_analysis.make_plumber_analysis_id
    input:
      workdir: "{{ctx().workdir}}"
      pipeline: "{{ctx().pipeline}}"
      pipeline_version: "{{ctx().pipeline_version}}"
    next:
      - when: "{{ succeeded() }}"
        publish:
          analysis_id="{{result().result}}"
        do:
          get_sample_id
      - when: "{{ failed() }}"
        publish:
          - msg: "{{ result() }}"
        do:
          - report_failure

  get_sample_id:
    action: core.local
    input:
      cmd: 'basename "{{ctx().workdir}}"'
    next:
      - when: "{{ succeeded() }}"
        publish:
          sample_id="{{result().stdout}}"
        do:
          divide_pipeline_tasks
      - when: "{{ failed() }}"
        publish:
          - msg: "{{ result() }}"
        do:
          - report_failure

  divide_pipeline_tasks:
    action: core.noop
    next: # Should be the only possible one until we add more to sample_downstream_analysis
      - when: "{{ ctx().pipeline == 'nf-core/raredisease'}}"
        publish:
          result_path="{{ctx().workdir}}/raredisease_results"
        do:
          get_case_id
      - when: "{{ ctx().pipeline != 'nf-core/raredisease'}}"
        publish:
          msg="Unsupported pipeline {{ ctx().pipeline }}"
        do:
          report_failure

  get_case_id:
    action: core.local
    input:
      cmd: 'cut -d "," -f 9 "{{ ctx().workdir }}/samplesheet.csv" | tail -n 1'
    next:
      - when: "{{ succeeded() }}"
        publish:
          case_id="{{result().stdout}}"
        do: check_case_id
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  check_case_id:
    action: core.noop
    next:
      - when: "{{ ctx().case_id != '' }}"
        do: format_rd_output_files
      - when: "{{ ctx().case_id == '' }}"
        publish:
          - msg: "Failed to parse the case ID from the samplesheet."
        do:
          - report_failure

  format_rd_output_files:
    action: core.noop
    next:
      - when: "{{ succeeded() }}"
        publish:
          - output_files:
              "[{'path':'multiqc/multiqc_report.html',
              'level':'sample', 'type':'text', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'peddy/{{ctx().case_id}}.peddy.ped',
              'level':'sample', 'type':'text', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'peddy/{{ctx().case_id}}.sex_check.csv',
              'level':'sample', 'type':'text', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'peddy/{{ctx().case_id}}.ped_check.csv',
              'level':'sample', 'type':'text', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'alignment/{{ctx().sample_id}}_sorted_md.bam',
              'level':'sample', 'type':'bam', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'qc_bam/{{ctx().sample_id}}_mosdepth.per-base.d4',
              'level':'sample', 'type':'d4', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'annotate_snv/genome/{{ctx().sample_id}}_rhocallviz_autozyg_chromograph/{{ctx().sample_id}}_rhocallviz_chr*.png',
              'level':'sample', 'type':'png', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'qc_bam/{{ctx().sample_id}}_chromographcov/{{ctx().sample_id}}_tidditcov_chr*.png',
              'level':'sample', 'type':'png', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'smncopynumbercaller/out/{{ctx().case_id}}_smncopynumbercaller.tsv',
              'level':'sample', 'type':'text', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'rank_and_filter/{{ctx().case_id}}_snv_ranked_clinical.vcf.gz',
              'level':'sample', 'type':'vcf_snv', 'parent_id':'{{ctx().sample_id}}'},
              {'path':'rank_and_filter/{{ctx().case_id}}_snv_ranked_research.vcf.gz',
              'level':'sample', 'type':'vcf_snv', 'parent_id':'{{ctx().sample_id}}'}]"
        do: update_in_cleve
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  update_in_cleve:
    action: cleve.update_analysis
    input:
      analysis_id: "{{ ctx().analysis_id}}"
      state: ready
      files: "{{ ctx().output_files}}"
    next:
      - when: "{{ failed() }}"
        publish:
          - msg: <% result().stderr %>
        do:
          - report_failure

  report_failure:
    action: core.inject_trigger
    input:
      trigger_name: gmc_norr_analysis.email_notification
      payload:
        subject: >
          Failed to update successful plumber analysis of sample {{ctx().sample_id}}
          with {{ctx().pipeline}} in Cleve
        message: "{{ctx().msg}}"
