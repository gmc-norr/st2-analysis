---
name: make_rare_disease_samplesheet
pack: gmc_norr_analysis
description: Make samplesheet for rare_disease pipeline
runner_type: local-shell-script
entry_point: make_rare_disease_samplesheet.sh
enabled: true

parameters:
  sample_id:
    description: Sample id
    type: string
    required: true
    position: 0
  case_id:
    description: Case id
    type: string
    required: true
    position: 1
  referral_type:
    description: Referral type
    type: string
    required: true
    position: 2
  sex:
    description: Sex of sample
    type: string
    required: true
    position: 3
  fastq_r1:
    description: R1 fastq files of sample (divided by ',')
    type: array
    required: true
    position: 4
  fastq_r2:
    description: R2 fastq files of sample (divided by ',')
    type: array
    required: true
    position: 5
  out_dir:
    description: Output directory for the sample, where the samplesheet is saved.
    type: string
    required: true
    position: 6
