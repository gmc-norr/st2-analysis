---
name: sample_downstream_analysis
pack: gmc_norr_analysis
description: Workflow to run downstream analysis of a sample with plumber
runner_type: orquesta
entry_point: workflows/sample_downstream_analysis.yaml
enabled: true

parameters:
  sample_id:
    description: The ID of the sample to analyze
    type: string
    required: true
  run_path:
    description: The path to the sequencing run
    type: string
    required: true
  analysis_id:
    description: Id of the analysis that generated the sample's fastq files
    type: string
    required: true
