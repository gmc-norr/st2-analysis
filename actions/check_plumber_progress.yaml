---
name: check_plumber_progress
runner_type: remote-shell-cmd
description: Start
enabled: true
entry_point: ""
parameters:
  cmd: 
    description: Command to run
    type: string
    required: true
  cwd: 
    description: >
      Working directory where the script will be executed in
    type: string
  hosts:
    description: Host to run plumber on
    type: string
    default: "{{config_context.plumber.host}}"
    required: true
  username:
    description: User to run plumber with
    type: string
    default: "{{config_context.plumber.user}}"
    required: true
