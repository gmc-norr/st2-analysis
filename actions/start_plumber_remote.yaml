---
name: start_plumber_remote
runner_type: remote-shell-cmd
description: >
  Start plumber on a remote and set up Stackstorm webhook environmental variables
enabled: true
entry_point: ""
parameters:
  cmd:
    description: Plumber command to run
    type: string
    required: true
  cwd:
    description: >
      Plumber working directory
    type: string
  hosts:
    description: Host to run plumber on
    type: string
    default: "{{config_context.plumber.host}}"
    required: true
  username:
    description: User to run plumber with
    type: string
    default: "{{config_context.plumber.user}}"
    required: true
  env:
    description: Environmental variables to set up the plumber webhooks
    type: object
    required: true
    default:
      PLUMBER_WEBHOOK_URL: "{{st2kv.system.api_url}}/webhooks/plumber"
      PLUMBER_WEBHOOK_API_KEY: "{{st2kv.system.plumber_api_key | decrypt_kv }}"
      PLUMBER_WEBHOOK_NO_VERIFY: "true"
