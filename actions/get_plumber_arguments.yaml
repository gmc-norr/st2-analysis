---
name: get_plumber_arguments
pack: gmc_norr_analysis
description: Read the pipeline from the testprofile config file
runner_type: python-script
entry_point: get_plumber_arguments.py
enabled: true

parameters:
  config_path:
    description: Path to the directory with the config files for TestProfiles
    type: string
    required: true
    default: "{{ config_context.plumber.config_repo_raw}}"
    position: 0
  test_profile:
    description: Testprofile
    type: string
    required: true
    position: 1
